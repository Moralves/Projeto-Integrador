<div class="registrar-page">
  <h1 class="page-title">Registrar Nova Ocorrência</h1>

  <div *ngIf="error" class="alert alert-error">{{ error }}</div>
  <div *ngIf="success" class="alert alert-success">{{ success }}</div>

  <form (ngSubmit)="handleSubmit()" class="form-card">

    <div class="form-group">
      <label class="form-label">Bairro/Localização *</label>
      <app-autocomplete-select
        [options]="bairros"
        [placeholder]="'Digite ou selecione um bairro...'"
        [getOptionLabel]="getOptionLabelBairro"
        [getOptionValue]="getOptionValueBairro"
        [required]="true"
        (valueChange)="formData.idBairroLocal = $event">
      </app-autocomplete-select>
    </div>

    <div class="form-group">
      <label class="form-label">Tipo de Ocorrência *</label>
      <app-autocomplete-select
        [options]="tiposOcorrencia"
        [placeholder]="'Digite ou selecione o tipo...'"
        [getOptionLabel]="getOptionLabelTipo"
        [getOptionValue]="getOptionValueTipo"
        [required]="true"
        (valueChange)="formData.tipoOcorrencia = $event">
      </app-autocomplete-select>
    </div>

    <div class="form-group">
      <label class="form-label">Gravidade *</label>
      <app-autocomplete-select
        [options]="gravidades"
        [placeholder]="'Selecione a gravidade...'"
        [getOptionLabel]="getOptionLabelGravidade"
        [getOptionValue]="getOptionValueGravidade"
        [required]="true"
        (valueChange)="formData.gravidade = $event">
      </app-autocomplete-select>
    </div>

    <div class="form-group">
      <label class="form-label">Observações</label>
      <textarea
        [(ngModel)]="formData.observacoes"
        name="observacoes"
        placeholder="Descreva detalhes adicionais da ocorrência..."
        rows="4"
        maxlength="1000"
        class="form-textarea">
      </textarea>
      <div class="char-count">{{ formData.observacoes.length }}/1000</div>
    </div>

    <div class="form-actions">
      <button type="button" class="btn btn-secondary" [disabled]="loading" (click)="limpar()">
        Limpar
      </button>
      <button type="submit" class="btn btn-primary" [disabled]="loading">
        {{ loading ? 'Registrando...' : 'Registrar Ocorrência' }}
      </button>
    </div>
  </form>
</div>
