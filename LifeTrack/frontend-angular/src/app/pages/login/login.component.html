<div class="login-container">
  <div class="login-box">
    <div class="login-header">
      <h1>🚑 LifeTrack</h1>
      <p>Sistema de Gestão de Emergências</p>
    </div>
    
    <form (ngSubmit)="handleSubmit()" #loginForm="ngForm" class="login-form">
      <div *ngIf="error" class="error-message">{{ error }}</div>
      
      <div class="form-group">
        <label for="login">Usuário</label>
        <input
          id="login"
          name="login"
          type="text"
          [(ngModel)]="login"
          placeholder="Digite seu usuário"
          required
          autofocus
        />
      </div>

      <div class="form-group">
        <label for="senha">Senha</label>
        <input
          id="senha"
          name="senha"
          type="password"
          [(ngModel)]="senha"
          placeholder="Digite sua senha"
          required
        />
      </div>

      <button 
        type="submit" 
        class="login-button"
        [disabled]="loading || loginForm.invalid"
      >
        {{ loading ? 'Entrando...' : 'Entrar' }}
      </button>
    </form>
  </div>
</div>
