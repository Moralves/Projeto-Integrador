name: CI — LifeTrack Build Validation

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Build e validação do Backend (Java 17 + Maven)
  # ─────────────────────────────────────────────
  backend-build:
    name: Backend — Java 17 / Spring Boot
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Compilar projeto com Maven
        run: ./mvnw clean compile -B

      - name: Executar testes unitários
        run: ./mvnw test -B

      - name: Verificar qualidade do build (package sem deploy)
        run: ./mvnw package -DskipTests -B

  # ─────────────────────────────────────────────
  # JOB 2: Build e validação do Frontend (Angular + Node 20)
  # ─────────────────────────────────────────────
  frontend-build:
    name: Frontend — Angular / Node 20
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependências
        run: npm ci

      - name: Build de produção Angular
        run: npm run build -- --configuration production

  # ─────────────────────────────────────────────
  # JOB 3: Auditoria de segurança das dependências
  # ─────────────────────────────────────────────
  security-audit:
    name: Auditoria de Segurança — npm audit
    runs-on: ubuntu-latest
    needs: frontend-build

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependências
        run: npm ci

      - name: Auditoria de dependências (high/critical)
        run: npm audit --audit-level=high
        continue-on-error: true
